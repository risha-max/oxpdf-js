name: Publish @0xpdf/client

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: npm-publish
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Validate release tag matches package version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Git tag v${TAG} must match package.json version ${VERSION}"
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Build package
        run: npm run build

      - name: Check if version is already on npm
        id: npm_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if npm view "@0xpdf/client@${VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@0xpdf/client@${VERSION} is already on npm — skipping publish"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_version.outputs.published != 'true'
        run: npm publish --access public --provenance

      - name: Deprecate legacy oxpdf package
        if: steps.npm_version.outputs.published != 'true'
        run: npm deprecate oxpdf@* "Use @0xpdf/client instead — https://www.npmjs.com/package/@0xpdf/client"
        continue-on-error: true
